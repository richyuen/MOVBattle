<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MOVBattle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
    #renderCanvas { width: 100%; height: 100%; touch-action: none; outline: none; }

    #hud {
      position: absolute; top: 0; left: 0; width: 100%; pointer-events: none;
      display: flex; flex-direction: column; align-items: center; padding: 8px;
      color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); font-size: 14px;
    }
    #hud > * { pointer-events: auto; }

    .hud-row {
      display: flex; gap: 12px; align-items: center; margin-bottom: 6px;
      flex-wrap: wrap; justify-content: center;
    }

    .budget-label { font-weight: bold; font-size: 15px; }
    .budget-a { color: #4fc3f7; }
    .budget-b { color: #ef5350; }

    #selectedUnit { font-size: 13px; color: #ffd54f; }
    #statusText { font-size: 14px; color: #fff; margin-top: 4px; min-height: 20px; }

    .btn {
      padding: 6px 14px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px;
      background: rgba(0,0,0,0.5); color: #fff; cursor: pointer; font-size: 13px;
      transition: background 0.15s;
    }
    .btn:hover { background: rgba(255,255,255,0.15); }
    .btn.active { background: rgba(255,255,255,0.25); border-color: #ffd54f; }
    .btn.remove-active { background: rgba(239,83,80,0.4); border-color: #ef5350; }

    #unitPanel {
      position: absolute; bottom: 0; left: 0; width: 100%;
      background: rgba(0,0,0,0.75);
      display: flex; flex-direction: column;
    }
    #factionTabs {
      display: flex; gap: 0; border-bottom: 2px solid rgba(255,255,255,0.1);
      overflow-x: auto; scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
    }
    .faction-tab {
      padding: 7px 16px; border: none; border-bottom: 3px solid transparent;
      background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6);
      cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase;
      letter-spacing: 0.5px; white-space: nowrap; transition: all 0.15s;
    }
    .faction-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .faction-tab.active { color: #fff; background: rgba(255,255,255,0.12); }
    #unitGrid {
      padding: 6px 8px;
      display: flex; flex-wrap: wrap; gap: 4px; max-height: 100px; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #unitSearch {
      width: calc(100% - 16px);
      margin: 8px 8px 0;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      outline: none;
    }
    #unitSearch::placeholder { color: rgba(255,255,255,0.55); }
    .unit-btn {
      padding: 4px 8px; border: 1px solid rgba(255,255,255,0.2); border-radius: 3px;
      background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; font-size: 11px;
      transition: background 0.15s;
    }
    .unit-btn:hover { background: rgba(255,255,255,0.15); }
    .unit-btn.selected { border-color: #ffd54f; background: rgba(255,215,0,0.2); }
    .unit-empty { color: rgba(255,255,255,0.7); font-size: 12px; padding: 8px 4px; }

    #resultOverlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center;
      flex-direction: column; color: #fff;
    }
    #resultOverlay.visible { display: flex; }
    #resultTitle { font-size: 36px; font-weight: bold; margin-bottom: 12px; }
    #resultDetail { font-size: 16px; text-align: center; line-height: 1.6; margin-bottom: 20px; }

    #controls-help {
      position: absolute; bottom: 150px; right: 10px; color: rgba(255,255,255,0.4);
      font-size: 11px; line-height: 1.5; text-align: right; pointer-events: none;
    }

    /* ─── Mobile ─── */
    @media (max-width: 600px) {
      #hud { padding: 6px 4px; }
      .hud-row { gap: 6px; margin-bottom: 4px; }
      .budget-label { font-size: 13px; }

      .btn {
        padding: 10px 12px; font-size: 12px;
        min-height: 44px; min-width: 44px;
        display: inline-flex; align-items: center; justify-content: center;
      }

      #selectedUnit { font-size: 12px; }
      #statusText { font-size: 12px; }

      .faction-tab {
        padding: 10px 14px; font-size: 11px;
        min-height: 44px;
      }

      #unitGrid {
        gap: 6px; padding: 8px; max-height: 120px;
      }
      .unit-btn {
        padding: 8px 10px; font-size: 12px;
        min-height: 40px;
      }

      #controls-help { display: none; }

      #resultTitle { font-size: 28px; }
      #resultDetail { font-size: 14px; padding: 0 16px; }
    }

    @media (max-width: 400px) {
      .hud-row { gap: 4px; }
      .btn { padding: 8px 8px; font-size: 11px; }
      .budget-label { font-size: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="hud">
    <div class="hud-row">
      <span class="budget-label budget-a" id="budgetA">Team A: 100000</span>
      <span class="budget-label budget-b" id="budgetB">Team B: 100000</span>
    </div>
    <div class="hud-row">
      <button class="btn" id="btnRemove" onclick="window.game?.toggleRemoveMode()">Remove</button>
      <button class="btn" onclick="window.game?.startBattle()">Start</button>
      <button class="btn" onclick="window.game?.resetBattle()">Reset</button>
    </div>
    <div id="selectedUnit">Selected: Clubber (70g)</div>
    <div id="statusText"></div>
  </div>

    <div id="unitPanel">
      <div id="factionTabs"></div>
      <input id="unitSearch" type="search" placeholder="Search units" />
      <div id="unitGrid"></div>
    </div>

  <div id="resultOverlay">
    <div id="resultTitle"></div>
    <div id="resultDetail"></div>
    <button class="btn" onclick="window.game?.playAgain()" style="font-size:16px;padding:10px 24px;">Play Again</button>
  </div>

  <div id="controls-help">
    LClick: Place (blue zone = blue, red zone = red)<br>
    RClick: Remove | N/B: Cycle Unit<br>
    Space: Start | R: Reset<br>
    MWheel: Zoom | MMB: Pan | Q/E: Rotate
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
